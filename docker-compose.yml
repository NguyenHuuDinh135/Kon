services:
  db:
    image: ankane/pgvector:latest
    container_name: kon_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-nguyenhuudinh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kon_password}
      POSTGRES_DB: ${DB_NAME:-kon_erp_northwind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kon_network

  # Worker chuyên trách ETL và xử lý Agentic AI
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: kon_worker
    volumes:
      - ./packages:/app/packages
      - ./apps/worker:/app/apps/worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-nguyenhuudinh}:${DB_PASSWORD:-kon_password}@db:5432/${DB_NAME:-kon_erp_northwind}
      - KAGGLE_USERNAME=${KAGGLE_USERNAME}
      - KAGGLE_KEY=${KAGGLE_KEY}
      - PYTHONPATH=/app/packages/db-core:/app/packages/shared:/app/packages/ai-engine:/app/packages/mcp-servers
    depends_on:
      - db
    networks:
      - kon_network

  # API Gateway (FastAPI)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kon_api
    ports:
      - "8000:8000"
    volumes:
      - ./packages:/app/packages
      - ./apps/api:/app/apps/api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-nguyenhuudinh}:${DB_PASSWORD:-kon_password}@db:5432/${DB_NAME:-kon_erp_northwind}
      - PYTHONPATH=/app/packages/db-core:/app/packages/shared:/app/packages/ai-engine:/app/packages/mcp-servers
    depends_on:
      - db
    networks:
      - kon_network

networks:
  kon_network:
    driver: bridge

volumes:
  postgres_data: